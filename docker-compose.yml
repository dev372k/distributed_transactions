version: "3.8"

services:

  redis1:
    image: redis
    ports:
      - "6379:6379"

  redis2:
    image: redis
    ports:
      - "6380:6379"

  redis3:
    image: redis
    ports:
      - "6381:6379"


  storage_node1:
    build: .
    working_dir: /app/storage_node
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    environment:
      - REDIS_HOST=redis1
      - REDIS_PORT=6379
    ports:
      - "8001:8001"
    depends_on:
      - redis1


  storage_node2:
    build: .
    working_dir: /app/storage_node
    command: uvicorn main:app --host 0.0.0.0 --port 8002
    environment:
      - REDIS_HOST=redis2
      - REDIS_PORT=6379
    ports:
      - "8002:8002"
    depends_on:
      - redis2


  storage_node3:
    build: .
    working_dir: /app/storage_node
    command: uvicorn main:app --host 0.0.0.0 --port 8003
    environment:
      - REDIS_HOST=redis3
      - REDIS_PORT=6379
    ports:
      - "8003:8003"
    depends_on:
      - redis3


  coordinator:
    build: .
    working_dir: /app/coordinator
    command: uvicorn main:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    depends_on:
      - storage_node1
      - storage_node2
      - storage_node3